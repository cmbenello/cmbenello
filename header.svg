<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bg)" rx="6"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Accent line -->
  <rect x="60" y="88" width="80" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Name -->
  <text x="60" y="75" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#e6edf3">Charles Benello</text>

  <!-- Subtitle -->
  <text x="60" y="120" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#8b949e">systems research  ·  database internals  ·  gpu computing</text>

  <!-- Tags on the right -->
  <g transform="translate(60, 145)">
    <rect x="0" y="0" width="58" height="22" rx="11" fill="#1f6feb" opacity="0.15"/>
    <text x="29" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">PVLDB</text>

    <rect x="68" y="0" width="50" height="22" rx="11" fill="#1f6feb" opacity="0.15"/>
    <text x="93" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">HPTS</text>

    <rect x="128" y="0" width="48" height="22" rx="11" fill="#1f6feb" opacity="0.15"/>
    <text x="152" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">CIDR</text>

    <rect x="186" y="0" width="42" height="22" rx="11" fill="#238636" opacity="0.15"/>
    <text x="207" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#3fb950" text-anchor="middle">Rust</text>

    <rect x="238" y="0" width="52" height="22" rx="11" fill="#238636" opacity="0.15"/>
    <text x="264" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#3fb950" text-anchor="middle">CUDA</text>

    <rect x="300" y="0" width="60" height="22" rx="11" fill="#238636" opacity="0.15"/>
    <text x="330" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#3fb950" text-anchor="middle">Python</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="720" cy="40" r="2" fill="#58a6ff" opacity="0.3"/>
  <circle cx="740" cy="55" r="1.5" fill="#bc8cff" opacity="0.2"/>
  <circle cx="755" cy="35" r="1" fill="#3fb950" opacity="0.25"/>
  <circle cx="700" cy="60" r="1.5" fill="#58a6ff" opacity="0.15"/>
  <circle cx="730" cy="75" r="2" fill="#bc8cff" opacity="0.1"/>
</svg>
